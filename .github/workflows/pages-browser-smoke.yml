name: Browser smoke static Pages visuals

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "GitHub Pages URL to click-smoke."
        required: true
        default: "https://evcatalyst.github.io/evolocus/"

permissions:
  contents: read

concurrency:
  group: pages-browser-smoke
  cancel-in-progress: false

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EVOLOCUS_BROWSER_SMOKE: "1"
      EVOLOCUS_BROWSER_SMOKE_URL: ${{ inputs.target_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install browser smoke tooling
        run: python -m pip install -r requirements-dev.txt
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Validate public artifact boundary
        run: PYTHONPATH=src python -m evolocus.cli validate-public-artifacts --analysis-dir site/data/analysis
      - name: Click-smoke deployed visual route
        run: PYTHONPATH=src python -m pytest tests/test_pages_browser_smoke.py -q
