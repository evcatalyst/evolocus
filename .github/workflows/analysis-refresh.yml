name: Refresh static analysis artifacts

on:
  workflow_dispatch:
    inputs:
      use_grok:
        description: "Use GROK_API_KEY for offline aggregate-only briefing enrichment when available."
        required: true
        type: boolean
        default: true
      persist_artifacts:
        description: "Commit validated aggregate inquiry artifacts back to the current branch."
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-analysis:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GROK_API_KEY_ALIAS: ${{ secrets.Grok_api_key }}
      USE_GROK: ${{ inputs.use_grok }}
      PERSIST_ARTIFACTS: ${{ inputs.persist_artifacts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install support tooling
        run: python -m pip install -r requirements.txt
      - name: Check optional Grok secret presence
        run: |
          if [ -z "$GROK_API_KEY" ] && [ -n "$GROK_API_KEY_ALIAS" ]; then
            export GROK_API_KEY="$GROK_API_KEY_ALIAS"
          fi
          if [ "$USE_GROK" = "true" ] && [ -n "$GROK_API_KEY" ]; then
            echo "GROK_API_KEY is configured for offline analysis jobs."
          elif [ "$USE_GROK" = "true" ]; then
            echo "GROK_API_KEY is not configured; deterministic static analysis will run without LLM enrichment."
          else
            echo "Grok enrichment disabled by workflow input; deterministic static analysis will run."
          fi
      - name: Generate aggregate-only inquiry briefings
        run: |
          if [ -z "$GROK_API_KEY" ] && [ -n "$GROK_API_KEY_ALIAS" ]; then
            export GROK_API_KEY="$GROK_API_KEY_ALIAS"
          fi
          if [ "$USE_GROK" = "true" ]; then
            PYTHONPATH=src python -m evolocus.cli publish-inquiry-briefings \
              --analysis-dir site/data/analysis \
              --output site/data/analysis/inquiry_briefings.json \
              --use-grok
          else
            PYTHONPATH=src python -m evolocus.cli publish-inquiry-briefings \
              --analysis-dir site/data/analysis \
              --output site/data/analysis/inquiry_briefings.json
          fi
      - name: Generate aggregate-only question pack
        run: |
          if [ -z "$GROK_API_KEY" ] && [ -n "$GROK_API_KEY_ALIAS" ]; then
            export GROK_API_KEY="$GROK_API_KEY_ALIAS"
          fi
          if [ "$USE_GROK" = "true" ]; then
            PYTHONPATH=src python -m evolocus.cli publish-question-pack \
              --analysis-dir site/data/analysis \
              --output site/data/analysis/question_pack.json \
              --use-grok
          else
            PYTHONPATH=src python -m evolocus.cli publish-question-pack \
              --analysis-dir site/data/analysis \
              --output site/data/analysis/question_pack.json
          fi
      - name: Generate aggregate-only AI analysis pack
        run: |
          PYTHONPATH=src python -m evolocus.cli publish-ai-analysis-pack \
            --analysis-dir site/data/analysis \
            --output site/data/analysis/ai_analysis_pack.json
      - name: Write public refresh status
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          analysis_dir = Path("site/data/analysis")
          briefings = json.loads((analysis_dir / "inquiry_briefings.json").read_text(encoding="utf-8"))
          question_pack = json.loads((analysis_dir / "question_pack.json").read_text(encoding="utf-8"))
          ai_analysis_pack = json.loads((analysis_dir / "ai_analysis_pack.json").read_text(encoding="utf-8"))
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          server_url = os.environ.get("GITHUB_SERVER_URL", "https://github.com").rstrip("/")
          repository = os.environ.get("GITHUB_REPOSITORY", "evcatalyst/evolocus")
          generated_at = datetime.now(timezone.utc).isoformat()
          briefing_grok = briefings.get("grok") or {}
          question_grok = question_pack.get("grok") or {}
          payload = {
              "schema_version": "evolocus-actions-refresh-status-v1",
              "workflow_file": "analysis-refresh.yml",
              "workflow_name": os.environ.get("GITHUB_WORKFLOW", "Refresh static analysis artifacts"),
              "run_id": int(run_id) if run_id.isdigit() else run_id,
              "run_url": f"{server_url}/{repository}/actions/runs/{run_id}" if run_id else f"{server_url}/{repository}/actions/workflows/analysis-refresh.yml",
              "status": "completed_if_pages_deploys",
              "conclusion": "success_if_pages_deploys",
              "event": os.environ.get("GITHUB_EVENT_NAME", "workflow_dispatch"),
              "branch": os.environ.get("GITHUB_REF_NAME", "main"),
              "head_sha": os.environ.get("GITHUB_SHA", ""),
              "artifact_commit": os.environ.get("GITHUB_SHA", ""),
              "created_at": generated_at,
              "started_at": generated_at,
              "completed_at": generated_at,
              "generated_at": generated_at,
              "use_grok_input": os.environ.get("USE_GROK", "false").lower() == "true",
              "persist_artifacts_input": os.environ.get("PERSIST_ARTIFACTS", "false").lower() == "true",
              "dataset_revision": briefings.get("dataset_revision") or question_pack.get("dataset_revision") or "unknown",
              "artifacts": {
                  "inquiry_briefings": {
                      "path": "site/data/analysis/inquiry_briefings.json",
                      "generated_at": briefings.get("generated_at"),
                      "briefing_count": len(briefings.get("briefings") or []),
                      "grok_used": bool(briefing_grok.get("used")),
                      "model": briefing_grok.get("model"),
                  },
                  "question_pack": {
                      "path": "site/data/analysis/question_pack.json",
                      "generated_at": question_pack.get("generated_at"),
                      "prompt_count": len(question_pack.get("prompts") or []),
                      "grok_used": bool(question_grok.get("used")),
                      "model": question_grok.get("model"),
                  },
                  "ai_analysis_pack": {
                      "path": "site/data/analysis/ai_analysis_pack.json",
                      "generated_at": ai_analysis_pack.get("generated_at"),
                      "card_count": len(ai_analysis_pack.get("cards") or []),
                      "grok_used": bool((ai_analysis_pack.get("grok") or {}).get("used")),
                      "model": (ai_analysis_pack.get("grok") or {}).get("model"),
                  },
              },
              "validation": {
                  "public_artifact_guard": "required_before_pages_deploy",
                  "persisted_paths_allowlist": [
                      "site/data/analysis/inquiry_briefings.json",
                      "site/data/analysis/question_pack.json",
                      "site/data/analysis/ai_analysis_pack.json",
                      "site/data/analysis/refresh_status.json",
                  ],
                  "pages_deploy_after_validation": True,
              },
              "publication_policy": {
                  "artifact_kind": "aggregate_only_actions_refresh_status",
                  "raw_rows_included": False,
                  "ordinance_text_included": False,
                  "record_locator_values_included": False,
                  "review_events_included": False,
                  "browser_llm_calls": False,
                  "secrets_included": False,
                  "legal_findings": False,
              },
              "browser_boundary": "GitHub Pages displays static run metadata only. Grok calls, if enabled, run offline in GitHub Actions and no model credentials are delivered to browser JavaScript.",
          }
          (analysis_dir / "refresh_status.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - name: Validate public artifact boundary
        run: PYTHONPATH=src python -m evolocus.cli validate-public-artifacts --analysis-dir site/data/analysis
      - name: Persist aggregate inquiry artifacts
        if: ${{ inputs.persist_artifacts }}
        run: |
          git add site/data/analysis/inquiry_briefings.json site/data/analysis/question_pack.json site/data/analysis/ai_analysis_pack.json site/data/analysis/refresh_status.json
          staged="$(git diff --cached --name-only)"
          if [ -z "$staged" ]; then
            echo "No aggregate inquiry artifact changes to persist."
            exit 0
          fi
          for path in $staged; do
            case "$path" in
              site/data/analysis/inquiry_briefings.json|site/data/analysis/question_pack.json|site/data/analysis/ai_analysis_pack.json|site/data/analysis/refresh_status.json)
                ;;
              *)
                echo "Unexpected staged path: $path"
                exit 1
                ;;
            esac
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh aggregate inquiry artifacts [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
      - name: Summarize briefing artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("site/data/analysis/inquiry_briefings.json").read_text(encoding="utf-8"))
          question_pack = json.loads(Path("site/data/analysis/question_pack.json").read_text(encoding="utf-8"))
          ai_analysis_pack = json.loads(Path("site/data/analysis/ai_analysis_pack.json").read_text(encoding="utf-8"))
          grok = payload.get("grok") or {}
          question_grok = question_pack.get("grok") or {}
          ai_grok = ai_analysis_pack.get("grok") or {}
          summary = [
              "## EvoLOCUS inquiry briefing refresh",
              "",
              f"- Dataset revision: `{payload.get('dataset_revision')}`",
              f"- Briefings: `{len(payload.get('briefings') or [])}`",
              f"- Question prompts: `{len(question_pack.get('prompts') or [])}`",
              f"- AI analysis cards: `{len(ai_analysis_pack.get('cards') or [])}`",
              f"- Grok used: `{bool(grok.get('used'))}`",
              f"- Question-pack Grok used: `{bool(question_grok.get('used'))}`",
              f"- AI pack Grok source used: `{bool(ai_grok.get('used'))}`",
              f"- Grok model: `{grok.get('model')}`",
              f"- Refresh run: `{__import__('os').environ.get('GITHUB_RUN_ID')}`",
              "- Publication boundary: aggregate-only, no ordinance text, no raw rows, no browser LLM calls.",
          ]
          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(summary) + "\n", encoding="utf-8")
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
